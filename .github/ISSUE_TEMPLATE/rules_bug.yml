name: Rules bug
description: Report a legal move, illegal move, check, mate, or rules edge case.
title: "[Rules]: "
labels: ["rules", "needs-rules-verification"]
body:
  - type: input
    id: variant
    attributes:
      label: Variant
      placeholder: Annan shogi
    validations:
      required: true
  - type: input
    id: sfen
    attributes:
      label: SFEN
      description: Position where the rule issue appears.
    validations:
      required: true
  - type: input
    id: move
    attributes:
      label: Move
      description: USI move if the issue is move-specific.
      placeholder: 7g7f
  - type: textarea
    id: expected
    attributes:
      label: Expected ruling
      description: Say whether the move/check/mate should be legal or illegal and why.
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Rule source or Shogitter comparison
      description: Link or explanation for the expected ruling.
