[rules]
ruleset = "anhoku"

[paths]
output_dir = "haitaka_learn-out/anhoku-pilot"
trainer_checkout = "../variant-nnue-pytorch"
python = "python3"
cmake = "cmake"

[data]
train_games = 500
validation_games = 100
max_plies = 120
search_depth = 2
opening_random_plies = 12
sample_start_ply = 8
sample_every_ply = 2
max_positions_per_game = 36
seed = 55
jobs = 0
shard_games = 25
progress_every_percent = 5
resume = true

[training]
features = "HalfKAv2^"
num_workers = 4
batch_size = 16384
lambda = 1.0
random_fen_skipping = 3
epoch_size = 80000
validation_size = 8000
max_epochs = 2
build_data_loader = true
extra_args = ["--threads", "8", "--accelerator", "gpu", "--devices", "1"]

[export]
output_name = "haitaka-anhoku-pilot.nnue"
description = "Haitaka Anhoku pilot NNUE trained with variant-nnue-pytorch"

[verify]
search_depth = 2
run_search_smoke = true
