[rules]
ruleset = "standard"
rule_id = 0

[paths]
output_dir = "haitaka_learn-out"
# Point this at a local `variant-nnue-pytorch` checkout.
trainer_checkout = "../variant-nnue-pytorch"
bootstrap_nnue = "../shogi-878ca61334a7.nnue"
python = "python3"
cmake = "cmake"

[data]
train_games = 8
validation_games = 2
max_plies = 160
search_depth = 2
opening_random_plies = 8
sample_start_ply = 0
sample_every_ply = 2
max_positions_per_game = 24
seed = 42

[training]
features = "HalfKAv2^"
num_workers = 1
batch_size = 16384
lambda = 1.0
random_fen_skipping = 3
epoch_size = 200000
validation_size = 20000
max_epochs = 1
build_data_loader = true
# Upstream train.py calls `.cuda()` internally, so GPU-capable environments are
# the primary supported path for training. Add any extra Lightning args here.
extra_args = []

[export]
output_name = "haitaka.nnue"
description = "Haitaka network trained with variant-nnue-pytorch"

[verify]
search_depth = 2
run_search_smoke = true
